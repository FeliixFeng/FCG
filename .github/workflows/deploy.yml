name: Build and Deploy

on:
  push:
    branches: [ main, dev ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
      ACR_NAMESPACE: feliixfeng

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend jar
        working-directory: fcg-server
        run: mvn package -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: fcg-client
        run: npm install && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: https://${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./fcg-server
          file: ./fcg-server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-server:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-server:${{ github.sha }}

      - name: Build and push frontend image to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./fcg-client
          file: ./fcg-client/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-client:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-client:${{ github.sha }}

      - name: Clean old frontend dist on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/user/apps/fcg/fcg-client
            rm -rf /home/user/apps/fcg/fcg-client/dist

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "fcg-server/target/fcg-server-1.0.0.jar,fcg-server/Dockerfile,fcg-client/dist,fcg-client/nginx.conf,fcg-client/Dockerfile,docker-compose.yml"
          target: "/home/user/apps/fcg"
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/user/apps/fcg
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-server:latest
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-client:latest
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-server:latest fcg-server:latest
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/fcg-client:latest fcg-web:latest
            docker compose up -d --force-recreate
