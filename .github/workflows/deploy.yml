name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend jar
        working-directory: fcg-server
        run: mvn package -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: fcg-client
        run: npm install && npm run build

      - name: Clean old frontend dist on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/user/apps/fcg/fcg-client
            rm -rf /home/user/apps/fcg/fcg-client/dist

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "fcg-server/target/fcg-server-1.0.0.jar,fcg-server/Dockerfile,fcg-client/dist,fcg-client/nginx.conf,fcg-client/Dockerfile,docker-compose.yml"
          target: "/home/user/apps/fcg"
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/user/apps/fcg
            docker build -t fcg-server:latest ./fcg-server
            docker build -t fcg-web:latest ./fcg-client
            docker compose up -d --force-recreate
