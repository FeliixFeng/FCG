server:
  port: 8080

spring:
  application:
    name: fcg-server
  profiles:
    active: local

---
# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

---
# 日志配置
logging:
  level:
    com.ghf.fcg: debug

---
# JWT 配置
jwt:
  secret: fcg-jwt-secret-key-change-this-in-production-2026
  expiration: 86400000
