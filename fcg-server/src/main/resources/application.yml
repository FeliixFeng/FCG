server:
  port: 8080

spring:
  application:
    name: fcg-server
  profiles:
    active: local
  datasource:
    hikari:
      connection-timeout: 10000
      validation-timeout: 5000
      max-lifetime: 1700000
      idle-timeout: 600000
      keepalive-time: 300000
      maximum-pool-size: 10
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

---
# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

---
# 日志配置
logging:
  level:
    com.ghf.fcg: debug

---
# JWT 配置（secret 在 application-local.yml 中覆盖）
jwt:
  secret: please-set-jwt-secret-in-application-local-yml
  expiration: 86400000

---
ocr:
  base-url: https://ocr.felixfeng.online

---
# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
