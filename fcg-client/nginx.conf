server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 接口文档反向代理
    location = /doc.html {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /webjars/ {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /v3/api-docs {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /swagger-ui/ {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /swagger-ui.html {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端
    location /api/ {
        proxy_pass http://fcg-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
